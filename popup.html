<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ReelStats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* {
    box-sizing: border-box;
    font-family: 'Inter', -apple-system, sans-serif;
}

body {
    width: 320px;
    margin: 0;
    background: #09090b;
    color: #ededed;
    overflow-x: hidden;
}

/* Background animated gradient glow */
body::before {
    content: '';
    position: absolute;
    top: -50px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 100px;
    background: radial-gradient(circle, rgba(99,102,241,0.25) 0%, rgba(99,102,241,0) 70%);
    z-index: 0;
    filter: blur(20px);
    border-radius: 50%;
    animation: pulse 4s ease-in-out infinite alternate;
}

@keyframes pulse {
    0% { transform: translateX(-50%) scale(1); opacity: 0.8; }
    100% { transform: translateX(-50%) scale(1.3); opacity: 1; }
}

.container {
    padding: 24px;
    position: relative;
    z-index: 1;
}

.header {
    text-align: left;
    margin-bottom: 24px;
}

.header h2 {
    margin: 0;
    font-size: 22px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, #fff 0%, #a1a1aa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.header p {
    margin: 4px 0 0 0;
    font-size: 13px;
    color: #a1a1aa;
    font-weight: 300;
}

.button-group {
    display: flex;
    gap: 12px;
    margin-top: 20px;
}

button {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: none;
    font-weight: 500;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
    position: relative;
    overflow: hidden;
}

#scanBtn {
    background: #fff;
    color: #000;
    box-shadow: 0 4px 14px rgba(255,255,255,0.1);
}

#scanBtn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(255,255,255,0.15);
}

#stopBtn {
    background: rgba(255,255,255,0.05);
    color: #ededed;
    border: 1px solid rgba(255,255,255,0.1);
}

#stopBtn:hover {
    background: rgba(255,255,255,0.1);
}

#status {
    margin-top: 14px;
    font-size: 12px;
    color: #71717a;
    min-height: 16px;
    text-align: center;
}

.result-card {
    margin-top: 24px;
    background: rgba(255,255,255,0.02);
    padding: 20px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
}

.result-card h3 {
    margin: 0;
    font-size: 13px;
    color: #a1a1aa;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.result-card .value {
    margin-top: 8px;
    font-size: 32px;
    font-weight: 300;
    color: #fff;
    letter-spacing: -1px;
}

#grid {
    max-height: 140px;
    overflow-y: auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 20px;
}

#grid::-webkit-scrollbar {
    width: 4px;
}
#grid::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
}

.cell {
    background: rgba(255,255,255,0.03);
    padding: 10px 4px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 500;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.05);
    color: #e4e4e7;
    transition: all 0.2s;
}

.cell:hover {
    background: rgba(255,255,255,0.08);
}

#error {
    margin-top: 14px;
    color: #fb7185;
    font-size: 12px;
    min-height: 16px;
    text-align: center;
}
</style>
</head>
<body>

<div class="container">

    <div class="header">
        <h2>ReelStats</h2>
        <p>Insights</p>
    </div>

    <div class="button-group">
        <button id="scanBtn">Start</button>
        <button id="stopBtn">Stop</button>
    </div>

    <div id="status"></div>

    <div class="result-card">
        <h3>Average</h3>
        <div id="result" class="value">--</div>
    </div>

    <div id="grid"></div>

    <div id="error"></div>

</div>

<script src="popup.js"></script>

</body>
</html>
